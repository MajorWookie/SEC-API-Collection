$kind: http-request
description: >-
  Search executive compensation data with custom queries.


  **Required Parameters:**

  - `query` (string): Lucene query expression


  **Optional Parameters:**

  - `from` (string): Pagination offset (default: 0, max: 10000)

  - `size` (string): Results per page (default: 50, max: 50)

  - `sort` (array): Sort order


  **Searchable Fields:** ticker, CIK, executive name, position, reportingYear,
  salary, bonus, stockAwards, optionAwards, incentiveCompensation,
  pensionChanges, otherCompensation, totalCompensation


  **Docs:** https://sec-api.io/docs/executive-compensation-api
url: "{{BASE_URL}}/compensation"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "query": "ticker:AAPL AND reportingYear:2023",
      "from": "0",
      "size": "50",
      "sort": [{"totalCompensation": {"order": "desc"}}]
    }
order: 3000
