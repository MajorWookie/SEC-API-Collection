$kind: http-request
description: >-
  Search directors and board member data across 10,000+ companies.


  **Required Parameters:**

  - `query` (string): Lucene query expression


  **Optional Parameters:**

  - `from` (string): Pagination offset (default: 0, max: 10000)

  - `size` (string): Results per page (default: 50, max: 50)

  - `sort` (array): Sort order


  **Key Response Fields:** name, position, age, directorClass, dateFirstElected,
  isIndependent, committeeMemberships, qualificationsAndExperience


  **Coverage:** 100,000+ directors, 2007-present, real-time updates


  **Docs:** https://sec-api.io/docs/directors-and-board-members-api
url: "{{BASE_URL}}/directors-and-board-members"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "query": "ticker:AAPL AND isIndependent:true",
      "from": "0",
      "size": "50",
      "sort": [{"filedAt": {"order": "desc"}}]
    }
order: 4000
