$kind: http-request
description: >-
  Get outstanding shares and public float data.


  **Parameters (one required):**

  - `ticker` (string): Stock ticker symbol

  - `cik` (string): Central Index Key


  **Key Response Fields:** outstandingShares, publicFloat, periodOfReport,
  sourceFilingAccessionNo


  **Docs:** https://sec-api.io/docs/outstanding-shares-api
url: "{{BASE_URL}}/float?ticker={{TICKER}}"
method: GET
queryParams:
  - key: ticker
    value: "{{TICKER}}"
    description: (Required, one of ticker or cik) Stock ticker symbol
  - key: cik
    value: "{{CIK}}"
    disabled: true
    description: (Alternative) Central Index Key
order: 5000
