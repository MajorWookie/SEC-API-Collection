$kind: http-request
description: >-
  Search Form N-PORT mutual fund portfolio holdings.


  **Required Parameters:**

  - `query` (string): Lucene query with Boolean operators, wildcards, nested
  conditions


  **Optional Parameters:**

  - `from` (integer): Pagination offset (default: 0)

  - `size` (integer): Results per page (default: 10, max: 10)

  - `sort` (array): Sort order


  **Docs:** https://sec-api.io/docs/form-nport-api
url: "{{BASE_URL}}/form-nport"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "query": "genInfo.seriesName:\"Vanguard 500 Index Fund\"",
      "from": "0",
      "size": "10",
      "sort": [{"genInfo.repPd": {"order": "desc"}}]
    }
order: 5000
