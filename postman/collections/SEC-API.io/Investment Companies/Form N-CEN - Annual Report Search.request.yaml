$kind: http-request
description: |-
  Search Form N-CEN annual reports for investment companies.

  **Required Parameters:**
  - `query` (string): Lucene query expression

  **Optional Parameters:**
  - `from` (integer): Pagination offset (default: 0, max: 10000)
  - `size` (integer): Results per page (default: 50, max: 50)
  - `sort` (array): Sort order

  **Docs:** https://sec-api.io/docs/form-ncen-api
url: "{{BASE_URL}}/form-ncen"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "query": "generalInfo.seriesName:\"Vanguard 500 Index Fund\"",
      "from": "0",
      "size": "10",
      "sort": [{"filedAt": {"order": "desc"}}]
    }
order: 1000
