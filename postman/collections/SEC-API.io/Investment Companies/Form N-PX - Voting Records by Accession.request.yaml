$kind: http-request
description: >-
  Get detailed proxy voting records for a specific N-PX filing. Can return up to
  500,000 voting records.


  **Path Parameters:**

  - `accession-number` (required): SEC accession number


  **Response:** JSON with proxyVotingRecords array


  **Docs:** https://sec-api.io/docs/form-npx-api
url: "{{BASE_URL}}/form-npx/{{NPX_ACCESSION}}?token={{SEC_API_KEY}}"
method: GET
queryParams:
  - key: token
    value: "{{SEC_API_KEY}}"
    description: API key
order: 4000
