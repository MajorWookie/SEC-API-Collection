$kind: http-request
description: >-
  Full-text search across the content of SEC filings. Returns filings containing
  the search term with highlighted excerpts.


  **Required Parameters:**

  - `query` (string): Search term or phrase. Use quotes for exact match.


  **Optional Parameters:**

  - `formTypes` (array): Filter by form types, e.g. ["10-K", "8-K"]

  - `startDate` (string): Start date in yyyy-mm-dd (default: 30 days ago)

  - `endDate` (string): End date in yyyy-mm-dd (default: today)

  - `ciks` (array): Restrict to specific CIKs

  - `page` (string): Page number (100 results/page, default: 1, max results:
  10000)


  **Query Features:** Exact phrases ("quotes"), wildcards (*), Boolean (OR,
  NOT), hyphen exclusion


  **Docs:** https://sec-api.io/docs/full-text-search-api
url: "{{BASE_URL}}/full-text-search"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "query": "substantial doubt",
      "formTypes": ["10-K", "10-Q"],
      "startDate": "2024-01-01",
      "endDate": "2024-12-31",
      "page": "1"
    }
order: 2000
