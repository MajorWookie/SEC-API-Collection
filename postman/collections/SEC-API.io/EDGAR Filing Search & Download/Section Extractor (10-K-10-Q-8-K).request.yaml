$kind: http-request
name: Section Extractor (10-K/10-Q/8-K)
description: >-
  Extract specific sections from 10-K, 10-Q, or 8-K filings.


  **Required Parameters:**

  - `token` (string): API key

  - `url` (string): Filing URL

  - `item` (string): Section identifier


  **Optional Parameters:**

  - `type` (string): 'text' (default) or 'html'


  **10-K Sections:** 1, 1A, 1B, 1C, 2, 3, 4, 5, 6, 7, 7A, 8, 9, 9A, 9B, 10, 11,
  12, 13, 14, 15

  **10-Q Sections:** part1item1, part1item2, part1item3, part1item4, part2item1,
  part2item1a, part2item2, part2item3, part2item4, part2item5, part2item6

  **8-K Sections:** 1-1 through 9-1, signature


  **Docs:** https://sec-api.io/docs/sec-filings-item-extraction-api
url: "{{BASE_URL}}/extractor?token={{SEC_API_KEY}}&url={{FILING_HTM_URL}}&item=\
  1A&type=text"
method: GET
queryParams:
  - key: token
    value: "{{SEC_API_KEY}}"
    description: (Required) API key
  - key: url
    value: "{{FILING_HTM_URL}}"
    description: (Required) SEC filing URL. Auto-populated from Filing Query API.
  - key: item
    value: 1A
    description: "(Required) Section identifier. 10-K: 1, 1A, 1B, 1C, 2-15. 10-Q:
      part1item1-4, part2item1-6. 8-K: 1-1 through 9-1, signature"
  - key: type
    value: text
    description: "(Optional) Response format: 'text' (default) or 'html'"
order: 6000
