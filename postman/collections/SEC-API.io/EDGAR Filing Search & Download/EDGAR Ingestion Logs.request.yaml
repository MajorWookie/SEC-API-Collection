$kind: http-request
description: >-
  Get EDGAR filing ingestion logs for a specific date.


  **Path Parameters:**

  - `date` (required): Date in YYYY-MM-DD format


  **Response:** JSON with lastUpdatedAt, total.value, and data array
  (accessionNo, formType, filedAt)


  **Docs:** https://sec-api.io/docs/query-api
url: "{{BASE_URL}}/edgar-index/ingestion-log/{{TODAY}}?token={{SEC_API_KEY}}"
method: GET
queryParams:
  - key: token
    value: "{{SEC_API_KEY}}"
    description: API key
order: 7000
