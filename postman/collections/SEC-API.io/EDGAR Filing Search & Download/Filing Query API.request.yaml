$kind: http-request
description: >-
  Search SEC EDGAR filings using Lucene query syntax. Supports filtering by form
  type, ticker, CIK, date ranges, and more.


  **Required Parameters:**

  - `query` (string): Lucene query expression (max 3500 chars)


  **Optional Parameters:**

  - `from` (string): Pagination offset (default: 0, max: 10000)

  - `size` (string): Results per page (default: 50, max: 50)

  - `sort` (array): Sort order, e.g. [{"filedAt": {"order": "desc"}}]


  **Example Queries:**

  - `formType:"10-K" AND ticker:AAPL` - Apple 10-K filings

  - `formType:"8-K" AND filedAt:[2024-01-01 TO 2024-12-31]` - All 8-K filings in
  2024

  - `cik:320193` - All filings by CIK


  **Docs:** https://sec-api.io/docs/query-api
url: "{{BASE_URL}}"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: >-
    {
        "query": "formType:\"10-K\" AND (companyName:\"{{companyName}}\" OR ticker:{{ticker}})",
        "from": "0",
        "size": "1",
        "sort": [
            {
                "filedAt": {
                    "order": "desc"
                }
            }
        ]
    }
scripts:
  - type: afterResponse
    code: >-
      var json = pm.response.json();

      if (json.filings && json.filings.length > 0) {
          var f = json.filings[0];
          pm.collectionVariables.set('FILING_CIK', String(f.cik));
          pm.collectionVariables.set('CIK', String(f.cik));
          pm.collectionVariables.set('TICKER', f.ticker || '');
          var accDashed = f.accessionNo || '';
          pm.collectionVariables.set('FILING_ACCESSION_DASHED', accDashed);
          pm.collectionVariables.set('FILING_ACCESSION', accDashed.replace(/-/g, ''));
          var url = f.linkToFilingDetails || '';
          pm.collectionVariables.set('FILING_HTM_URL', url);
          var xbrl = f.linkToXbrl || '';
          pm.collectionVariables.set('FILING_XBRL_URL', xbrl);
          var parts = url.split('/');
          pm.collectionVariables.set('FILING_FILENAME', parts[parts.length - 1] || '');
          console.log('Stored filing variables from: ' + f.companyName);
      }
    language: text/javascript
order: 1000
