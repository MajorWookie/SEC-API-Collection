$kind: http-request
description: >-
  Download any SEC filing document from the EDGAR archive mirror.


  **Path Parameters:**

  - `cik` (required): Filer's CIK without leading zeros (e.g. 1318605)

  - `accession-number` (required): Numeric only, hyphens removed (e.g.
  000156459021004599)

  - `filename` (required): Document filename (any type: HTML, XML, TXT, PDF)


  **Rate Limits:** Standard: 50 req/sec. Beta mirror (edgar-mirror.sec-api.io):
  200 req/sec


  **Docs:** https://sec-api.io/docs/sec-filings-render-api
url: "{{ARCHIVE_URL}}/{{FILING_CIK}}/{{FILING_ACCESSION}}/{{FILING_FILENAME}}"
method: GET
order: 4000
