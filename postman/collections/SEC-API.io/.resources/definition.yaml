$kind: collection
name: SEC-API.io
description: >-
  Comprehensive Postman collection for the SEC-API.io platform. Covers all SEC
  EDGAR filing search, download, and structured data APIs.


  ## Getting Started

  1. Set the `SEC_API_KEY` variable to your API key from https://sec-api.io

  2. All requests use the Authorization header automatically

  3. Example values are pre-populated for immediate testing


  ## Authentication

  All requests inherit the collection-level `Authorization: {{SEC_API_KEY}}`
  header. Bulk download endpoints also include `?token={{SEC_API_KEY}}` as a
  query parameter fallback.
auth:
  type: apikey
  apikey:
    key: Authorization
    value: "{{SEC_API_KEY}}"
    in: header
scripts:
  - type: beforeRequest
    code: >-
      var now = new Date();

      pm.collectionVariables.set('TODAY', now.toISOString().split('T')[0]);

      pm.collectionVariables.set('CURRENT_YEAR', String(now.getFullYear()));
    language: text/javascript
variables:
  SEC_API_KEY:
    value: "YOUR_API_KEY_HERE"
    description: Your SEC-API.io API key. Get one at https://sec-api.io
  BASE_URL:
    value: "https://api.sec-api.io"
    description: Base URL for SEC-API.io endpoints
  ARCHIVE_URL:
    value: "https://archive.sec-api.io"
    description: Base URL for SEC filing archive downloads
  FILING_HTM_URL:
    value: "https://www.sec.gov/Archives/edgar/data/320193/000032019324000123/aapl-20240928.htm"
    description: Filing URL from search results. Auto-set by Filing Query API test script.
  FILING_CIK:
    value: "320193"
    description: CIK from filing search results. Auto-set by Filing Query API.
  FILING_ACCESSION:
    value: "000032019324000123"
    description: Accession number without hyphens. Auto-set by Filing Query API.
  FILING_ACCESSION_DASHED:
    value: "0000320193-24-000123"
    description: Accession number with hyphens. Auto-set by Filing Query API.
  FILING_FILENAME:
    value: "aapl-20240928.htm"
    description: Document filename. Auto-set by Filing Query API.
  FILING_XBRL_URL:
    value: ""
    description: XBRL file URL. Auto-set by Filing Query API.
  FILING_URL:
    value: ""
    description: Filing URL.
  FIRM_CRD:
    value: "161222"
    description: Investment adviser CRD number. Auto-set by Form ADV Firm Search.
  NPX_ACCESSION:
    value: "0000102909-23-013588"
    description: N-PX accession number. Auto-set by N-PX Proxy Voting Search.
  REPORT_ID:
    value: "example-report-id"
    description: Audit report ID. Auto-set by Audit Reports search.
  TICKER:
    value: "AAPL"
    description: Company ticker. Auto-set by Filing Query API or Mapping endpoints.
  CIK:
    value: "320193"
    description: Company CIK. Auto-set by Filing Query API or Mapping endpoints.
  CUSIP:
    value: "037833100"
    description: Company CUSIP. Auto-set by Mapping endpoints.
  AAER_NO:
    value: "4500"
    description: AAER number. Auto-set by AAER Search.
  AAER_FILENAME:
    value: "primary-34-99000.pdf.txt"
    description: AAER document filename. Auto-set by AAER Search.
  TODAY:
    value: "2026-03-19"
    description: Current date. Auto-set by collection pre-request script.
  CURRENT_YEAR:
    value: "2026"
    description: Current year. Auto-set by collection pre-request script.
  companyName:
    value: ""
    description: Company name for search queries.
  ticker:
    value: ""
    description: Ticker symbol for search queries.
