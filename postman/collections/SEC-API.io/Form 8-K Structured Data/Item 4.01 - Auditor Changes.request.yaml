$kind: http-request
description: >-
  Search Form 8-K Item 4.01 auditor change disclosures.


  **Required Parameters:**

  - `query` (string): Lucene query targeting item401 fields


  **Optional Parameters:**

  - `from` (integer): Pagination offset (default: 0, max: 10000)

  - `size` (integer): Results per page (default: 50, max: 50)

  - `sort` (array): Sort order


  **Key Item 4.01 Fields:** newAccountantName, formerAccountantName,
  engagementEndReason, goingConcern, reportedIcfrWeakness, opinionType


  **Docs:** https://sec-api.io/docs/form-8k-api
url: "{{BASE_URL}}/form-8k"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: >-
    {
      "query": "items.item401.newAccountantName:\"Deloitte\" AND filedAt:[2024-01-01 TO 2024-12-31]",
      "from": "0",
      "size": "50",
      "sort": [{"filedAt": {"order": "desc"}}]
    }
order: 1000
