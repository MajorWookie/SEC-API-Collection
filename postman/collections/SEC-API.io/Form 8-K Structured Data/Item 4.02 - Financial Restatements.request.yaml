$kind: http-request
description: >-
  Search Form 8-K Item 4.02 financial restatement disclosures.


  **Required Parameters:**

  - `query` (string): Lucene query targeting item402 fields


  **Optional Parameters:**

  - `from` (integer): Pagination offset (default: 0, max: 10000)

  - `size` (integer): Results per page (default: 50, max: 50)

  - `sort` (array): Sort order


  **Key Item 4.02 Fields:** keyComponents, identifiedIssues,
  affectedReportingPeriods, restatementIsNecessary, reasonsForRestatement,
  impactIsMaterial, materialWeaknessIdentified, netIncomeDecreased/Increased,
  revenueDecreased/Increased


  **Docs:** https://sec-api.io/docs/form-8k-api
url: "{{BASE_URL}}/form-8k"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: >-
    {
      "query": "items.item402.restatementIsNecessary:true AND filedAt:[2024-01-01 TO 2024-12-31]",
      "from": "0",
      "size": "50",
      "sort": [{"filedAt": {"order": "desc"}}]
    }
order: 2000
