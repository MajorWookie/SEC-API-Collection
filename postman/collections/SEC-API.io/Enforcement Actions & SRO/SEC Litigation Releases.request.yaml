$kind: http-request
description: >-
  Search SEC litigation releases. Coverage: 10,000+ releases from 1995-present.


  **Required Parameters:**

  - `query` (string): Lucene query expression


  **Optional Parameters:**

  - `from` (string): Pagination offset (default: 0, max: 10000)

  - `size` (string): Results per page (default: 50, max: 50)

  - `sort` (array): Sort order (default: releasedAt desc)


  **Key Response Fields:** releaseNo, releasedAt, url, title, summary, tags,
  entities, penaltyAmounts, violatedSections, hasAgreedToSettlement,
  hasAgreedToPayPenalty


  **Docs:** https://sec-api.io/docs/sec-litigation-releases-api
url: "{{BASE_URL}}/sec-litigation-releases"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "query": "releasedAt:[2024-01-01 TO 2024-12-31]",
      "from": "0",
      "size": "50",
      "sort": [{"releasedAt": {"order": "desc"}}]
    }
order: 2000
