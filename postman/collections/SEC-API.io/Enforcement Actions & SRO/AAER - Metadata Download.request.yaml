$kind: http-request
description: |-
  Download complete AAER metadata as a single JSON file.

  **Docs:** https://sec-api.io/docs/aaer-api
url: "{{BASE_URL}}/aaers/metadata/all.json?token={{SEC_API_KEY}}"
method: GET
queryParams:
  - key: token
    value: "{{SEC_API_KEY}}"
    description: API key
order: 5000
