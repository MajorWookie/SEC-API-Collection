$kind: http-request
description: >-
  Search Self-Regulatory Organization (SRO) filings.


  **Required Parameters:**

  - `query` (string): Lucene query expression


  **Optional Parameters:**

  - `from` (string): Pagination offset (default: 0, max: 10000)

  - `size` (string): Results per page (default: 100, max: 100)

  - `sort` (array): Sort order (default: issueDate desc)


  **Key Response Fields:** releaseNumber, issueDate, fileNumber, sro, details,
  commentsDue, urls


  **Docs:** https://sec-api.io/docs/sro-api
url: "{{BASE_URL}}/sro"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "query": "sro:\"NASDAQ\" AND issueDate:[2024-01-01 TO 2024-12-31]",
      "from": "0",
      "size": "100",
      "sort": [{"issueDate": {"order": "desc"}}]
    }
order: 7000
