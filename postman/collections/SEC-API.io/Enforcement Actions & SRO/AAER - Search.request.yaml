$kind: http-request
description: >-
  Search Accounting and Auditing Enforcement Releases (AAERs).


  **Required Parameters:**

  - `query` (string): Lucene query expression


  **Optional Parameters:**

  - `from` (string): Pagination offset (default: 0, max: 10000)

  - `size` (string): Results per page (default: 50, max: 50)

  - `sort` (array): Sort order


  **Key Response Fields:** aaerNo, releaseNumbers, dateTime, respondents,
  summary, tags, entities, complaints, penaltyAmounts, violatedSections,
  hasAgreedToSettlement


  **Docs:** https://sec-api.io/docs/aaer-api
url: "{{BASE_URL}}/aaers"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "query": "dateTime:[2024-01-01 TO 2024-12-31]",
      "from": "0",
      "size": "50",
      "sort": [{"dateTime": {"order": "desc"}}]
    }
scripts:
  - type: afterResponse
    code: >-
      var json = pm.response.json();

      if (json.data && json.data.length > 0) {
          pm.collectionVariables.set('AAER_NO', String(json.data[0].aaerNo));
          var releases = json.data[0].releaseNumbers || [];
          if (releases.length > 0) {
              pm.collectionVariables.set('AAER_FILENAME', 'primary-' + releases[0] + '.pdf.txt');
          }
          console.log('Stored AAER_NO: ' + json.data[0].aaerNo);
      }
    language: text/javascript
order: 4000
