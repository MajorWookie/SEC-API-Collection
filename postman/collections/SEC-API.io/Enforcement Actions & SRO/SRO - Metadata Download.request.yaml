$kind: http-request
description: >-
  Download complete SRO filings metadata from 1997-present as a single JSON
  file.


  **Docs:** https://sec-api.io/docs/sro-api
url: "{{BASE_URL}}/sro/metadata/all.json?token={{SEC_API_KEY}}"
method: GET
queryParams:
  - key: token
    value: "{{SEC_API_KEY}}"
    description: API key
order: 8000
