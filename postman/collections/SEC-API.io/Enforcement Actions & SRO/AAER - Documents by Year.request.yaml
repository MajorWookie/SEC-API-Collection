$kind: http-request
description: >-
  Download all AAER documents for a given year as a ZIP archive.


  **Path Parameters:**

  - `year` (required): 4-digit year (e.g. 2024)


  **Response:** Compressed ZIP with organized AAER folders containing PDFs and
  text files


  **Docs:** https://sec-api.io/docs/aaer-api
url: "{{BASE_URL}}/aaers/documents/{{CURRENT_YEAR}}.zip?token={{SEC_API_KEY}}"
method: GET
queryParams:
  - key: token
    value: "{{SEC_API_KEY}}"
    description: API key
order: 6000
