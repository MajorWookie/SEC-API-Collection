$kind: http-request
description: >-
  Search SEC enforcement actions.


  **Required Parameters:**

  - `query` (string): Lucene query with field:value format and AND/OR operators


  **Optional Parameters:**

  - `from` (string): Pagination offset (default: 0, max: 10000)

  - `size` (string): Results per page (default: 50, max: 50)

  - `sort` (array): Sort order (default: releasedAt desc)


  **Key Response Fields:** releaseNo, releasedAt, entities, penalties,
  violations


  **Docs:** https://sec-api.io/docs/sec-enforcement-actions-api
url: "{{BASE_URL}}/sec-enforcement-actions"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "query": "releasedAt:[2024-01-01 TO 2024-12-31]",
      "from": "0",
      "size": "50",
      "sort": [{"releasedAt": {"order": "desc"}}]
    }
order: 1000
