$kind: http-request
description: |-
  Search Form D private securities offering filings.

  **Required Parameters:**
  - `query` (string): Lucene query expression

  **Optional Parameters:**
  - `from` (integer): Pagination offset (default: 0)
  - `size` (integer): Results per page (default: 50, max: 50)
  - `sort` (array): Sort order

  **Key Response Fields:** primaryIssuer, offeringData, submissionType

  **Docs:** https://sec-api.io/docs/form-d-api
url: "{{BASE_URL}}/form-d"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: >-
    {
      "query": "primaryIssuer.stateOrCountry:\"CA\" AND offeringData.offeringSalesAmounts.totalOfferingAmount:[1000000 TO *]",
      "from": "0",
      "size": "50",
      "sort": [{"filedAt": {"order": "desc"}}]
    }
order: 3000
