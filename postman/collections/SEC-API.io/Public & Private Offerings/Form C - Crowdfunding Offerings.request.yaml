$kind: http-request
description: >-
  Search Form C crowdfunding offering filings.


  **Required Parameters:**

  - `query` (string): Lucene query with AND/OR operators


  **Optional Parameters:**

  - `from` (integer): Pagination offset (default: 0, max: 10000)

  - `size` (integer): Results per page (default: 50, max: 50)

  - `sort` (array): Sort order


  **Key Response Fields:** issuerInformation, offeringInformation,
  annualReportDisclosureRequirements, signatureInfo


  **Docs:** https://sec-api.io/docs/form-c-api
url: "{{BASE_URL}}/form-c"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "query": "filedAt:[2024-01-01 TO 2024-12-31]",
      "from": "0",
      "size": "50",
      "sort": [{"filedAt": {"order": "desc"}}]
    }
order: 2000
