$kind: http-request
description: |-
  Search Regulation A Form 1-Z exit reports.

  **Required Parameters:**
  - `query` (string): Lucene query expression

  **Optional Parameters:**
  - `from` (integer): Pagination offset (default: 0, max: 10000)
  - `size` (integer): Results per page (default: 50, max: 50)
  - `sort` (array): Sort order

  **Docs:** https://sec-api.io/docs/reg-a-api
url: "{{BASE_URL}}/reg-a/form-1z"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "query": "filedAt:[2024-01-01 TO 2024-12-31]",
      "from": "0",
      "size": "50",
      "sort": [{"filedAt": {"order": "desc"}}]
    }
order: 7000
