$kind: http-request
name: Form 13D/13G - Activist Investors
description: >-
  Search Form 13D and 13G activist investor filings (beneficial ownership >5%).


  **Required Parameters:**

  - `query` (string): Lucene query with Boolean operators, range queries,
  wildcards


  **Optional Parameters:**

  - `from` (integer): Pagination offset (default: 0, max: 10000)

  - `size` (integer): Results per page (default: 50, max: 50)

  - `sort` (array): Sort order


  **Key Response Fields:** accessionNo, formType, filedAt, filer info, issuer
  details, owner/acquirer data


  **Docs:** https://sec-api.io/docs/form-13d-13g-api
url: "{{BASE_URL}}/form-13d-13g"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "query": "ticker:AAPL",
      "from": "0",
      "size": "50",
      "sort": [{"filedAt": {"order": "desc"}}]
    }
order: 7000
