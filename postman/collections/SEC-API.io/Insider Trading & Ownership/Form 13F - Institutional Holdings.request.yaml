$kind: http-request
description: >-
  Search Form 13F institutional holdings data.


  **Required Parameters:**

  - `query` (string): Lucene query expression


  **Optional Parameters:**

  - `from` (string): Pagination offset (default: 0, max: 10000)

  - `size` (string): Results per page (default: 50, max: 50)

  - `sort` (array): Sort order


  **Key Response Fields:** nameOfIssuer, cusip, ticker, cik, value,
  shrsOrPrnAmt, investmentDiscretion, votingAuthority


  **Docs:** https://sec-api.io/docs/form-13f-api
url: "{{BASE_URL}}/form-13f/holdings"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: >-
    {
      "query": "holdings.nameOfIssuer:\"APPLE INC\" AND periodOfReport:[2024-01-01 TO 2024-12-31]",
      "from": "0",
      "size": "50",
      "sort": [{"periodOfReport": {"order": "desc"}}]
    }
order: 4000
