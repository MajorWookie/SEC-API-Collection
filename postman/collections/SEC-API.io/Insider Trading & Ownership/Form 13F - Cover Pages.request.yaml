$kind: http-request
description: >-
  Search Form 13F cover page data (filing manager info, total value, signature).


  **Required Parameters:**

  - `query` (string): Lucene query expression


  **Optional Parameters:**

  - `from` (string): Pagination offset (default: 0, max: 10000)

  - `size` (string): Results per page (default: 50, max: 50)

  - `sort` (array): Sort order


  **Key Response Fields:** filingManager, crdNumber, periodOfReport,
  tableValueTotal, signature


  **Docs:** https://sec-api.io/docs/form-13f-api
url: "{{BASE_URL}}/form-13f/cover-pages"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "query": "filingManager.name:\"BERKSHIRE HATHAWAY INC\"",
      "from": "0",
      "size": "10",
      "sort": [{"periodOfReport": {"order": "desc"}}]
    }
order: 5000
