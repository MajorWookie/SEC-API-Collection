$kind: http-request
description: >-
  Search Form 144 restricted stock sale notices. Dataset: 70,000+ filings since
  October 2022, updated within 300ms of EDGAR publication.


  **Required Parameters:**

  - `query` (string): Lucene query expression


  **Optional Parameters:**

  - `from` (integer): Pagination offset (default: 0, max: 10000)

  - `size` (integer): Results per page (default: 50, max: 50)

  - `sort` (array): Sort order


  **Docs:** https://sec-api.io/docs/form-144-api
url: "{{BASE_URL}}/form-144"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "query": "issuer.tradingSymbol:AAPL",
      "from": "0",
      "size": "50",
      "sort": [{"filedAt": {"order": "desc"}}]
    }
order: 3000
