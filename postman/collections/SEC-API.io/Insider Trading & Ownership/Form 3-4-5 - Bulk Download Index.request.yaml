$kind: http-request
name: Form 3/4/5 - Bulk Download Index
description: >-
  List available Form 4 bulk download files. Change path to form-3 or form-5 for
  other form types.


  **Variants:**

  - `/bulk/form-3/index.json`

  - `/bulk/form-4/index.json`

  - `/bulk/form-5/index.json`


  **Docs:** https://sec-api.io/docs/insider-ownership-trading-api
url: "{{BASE_URL}}/bulk/form-4/index.json?token={{SEC_API_KEY}}"
method: GET
queryParams:
  - key: token
    value: "{{SEC_API_KEY}}"
    description: API key
order: 2000
