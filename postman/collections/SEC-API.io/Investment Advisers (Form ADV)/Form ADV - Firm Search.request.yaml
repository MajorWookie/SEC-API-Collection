$kind: http-request
description: >-
  Search Form ADV investment adviser firm filings. Dataset: 41,000+ firms,
  updated daily 5:00-7:30 AM EST.


  **Required Parameters:**

  - `query` (string): Lucene query expression


  **Optional Parameters:**

  - `from` (integer): Pagination offset (default: 0, max: 10000)

  - `size` (integer): Results per page (default: 50, max: 50)

  - `sort` (array): Sort order


  **Docs:** https://sec-api.io/docs/form-adv-api
url: "{{BASE_URL}}/form-adv/firm"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "query": "Info.FirmName:\"BRIDGEWATER ASSOCIATES\"",
      "from": "0",
      "size": "10",
      "sort": [{"Info.FirmCrdNb": {"order": "asc"}}]
    }
scripts:
  - type: afterResponse
    code: |-
      var json = pm.response.json();
      if (json.data && json.data.length > 0) {
          var crd = json.data[0].Info && json.data[0].Info.FirmCrdNb;
          if (crd) pm.collectionVariables.set('FIRM_CRD', String(crd));
          console.log('Stored FIRM_CRD: ' + crd);
      }
    language: text/javascript
order: 1000
