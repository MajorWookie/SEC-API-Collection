$kind: http-request
description: >-
  Search individual investment adviser representatives. Dataset: 380,000+
  individuals.


  **Required Parameters:**

  - `query` (string): Lucene query expression


  **Optional Parameters:**

  - `from` (integer): Pagination offset (default: 0, max: 10000)

  - `size` (integer): Results per page (default: 50, max: 50)

  - `sort` (array): Sort order


  **Docs:** https://sec-api.io/docs/form-adv-api
url: "{{BASE_URL}}/form-adv/individual"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "query": "IndvlPK.lastNm:\"Smith\" AND IndvlPK.firstNm:\"John\"",
      "from": "0",
      "size": "50",
      "sort": [{"IndvlPK.lastNm": {"order": "asc"}}]
    }
order: 8000
