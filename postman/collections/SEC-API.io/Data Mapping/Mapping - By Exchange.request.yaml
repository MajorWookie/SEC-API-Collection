$kind: http-request
description: |-
  List all companies on a specific exchange.

  **Path Parameters:**
  - `exchange` (required): Exchange code (e.g. NASDAQ, NYSE, AMEX)

  **Docs:** https://sec-api.io/docs/mapping-api
url: "{{BASE_URL}}/mapping/exchange/NASDAQ?token={{SEC_API_KEY}}"
method: GET
queryParams:
  - key: token
    value: "{{SEC_API_KEY}}"
    description: API key
order: 5000
